name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Docker Compose
        run: docker compose version

      - name: Frontend lint
        run: make frontend-lint

      - name: Bootstrap stack
        run: make bootstrap

      - name: Run pre-PR gate
        run: make prepr
